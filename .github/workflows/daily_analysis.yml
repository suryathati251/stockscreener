name: Daily Stock Analysis

on:
  schedule:
    # 10am UAE time (UTC+4) = 06:00 UTC, weekdays only
    # Change hour to match YOUR local 10am:
    #   UAE/Gulf (UTC+4)  → "0 6  * * 1-5"
    #   London   (UTC+0)  → "0 10 * * 1-5"
    #   New York (UTC-4)  → "0 14 * * 1-5"
    - cron: '0 6 * * 1-5'

  # Run manually anytime: Actions tab → Daily Stock Analysis → Run workflow
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: write

    steps:
      - name: Checkout repo (always get latest)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0   # full history so rebase works

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Run stock analyzer
        run: python run_analysis.py

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 Daily analysis $(date +'%Y-%m-%d %H:%M UTC')"
            git fetch origin main
            git rebase origin/main
            git push origin main
          fi



